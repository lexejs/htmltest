<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
    <title>Telegram Mini App User Info</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        html { 
            font-family: Helvetica; 
            display: inline-block; 
            margin: 0px; 
            text-align: center;
        }
        
        body {
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            padding: 20px;
        }
        
        .user-info {
            text-align: left;
            max-width: 600px;
            margin: 0 auto;
        }

        .user-info div {
            margin: 10px 0;
            padding: 10px;
            background-color: var(--tg-theme-secondary-bg-color);
            border-radius: 8px;
        }

        .user-photo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: 20px auto;
            display: block;
        }

        .header {
            font-size: 24px;
            margin-bottom: 20px;
            color: var(--tg-theme-text-color);
        }
    </style>
</head> 
<body>
    <div class="user-info" id="userInfo">
        <h1 class="header">Информация о пользователе</h1>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function displayUserInfo() {
            const user = tg.initDataUnsafe.user;
            const userInfo = document.getElementById('userInfo');
            
            if (user) {
                // Добавляем фото пользователя, если оно есть
                if (user.photo_url) {
                    userInfo.innerHTML += `
                        <img src="${user.photo_url}" class="user-photo" alt="User photo">
                    `;
                }

                // Добавляем всю доступную информацию о пользователе
                const userDetails = {
                    'ID пользователя': user.id,
                    'Имя': user.first_name,
                    'Фамилия': user.last_name || 'Не указана',
                    'Имя пользователя': user.username || 'Не указано',
                    'Языковой код': user.language_code || 'Не указан',
                    'Премиум статус': user.is_premium ? 'Да' : 'Нет',
                };

                for (const [key, value] of Object.entries(userDetails)) {
                    userInfo.innerHTML += `
                        <div>${key}: ${value}</div>
                    `;
                }

                // Добавляем информацию о платформе
                userInfo.innerHTML += `
                    <h2 class="header">Информация о платформе</h2>
                    <div>Версия платформы: ${tg.platform}</div>
                    <div>Цветовая схема: ${tg.colorScheme}</div>
                    <div>Тема: ${tg.themeParams ? JSON.stringify(tg.themeParams) : 'Недоступно'}</div>
                `;

                // Добавляем информацию о чате, если она доступна
                if (tg.initDataUnsafe.chat) {
                    const chat = tg.initDataUnsafe.chat;
                    userInfo.innerHTML += `
                        <h2 class="header">Информация о чате</h2>
                        <div>ID чата: ${chat.id}</div>
                        <div>Тип: ${chat.type}</div>
                        <div>Название: ${chat.title}</div>
                    `;
                }
            } else {
                userInfo.innerHTML += `
                    <div>Информация о пользователе недоступна</div>
                `;
            }
        }

        // Инициализация Telegram Mini App
        tg.ready();
        displayUserInfo();
    </script>
</body>
</html>
